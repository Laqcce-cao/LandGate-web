server {
    listen 80;
    server_name _;

    # 前端静态资源
    root /usr/share/nginx/html;
    index index.html;

    # AI API 代理到后端（Anthropic /v1/messages, OpenAI /v1/chat/completions 等）
    location /v1/ {
        proxy_pass http://landgate-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://landgate-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Actuator 代理到后端
    location /actuator/ {
        proxy_pass http://landgate-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — 前端路由刷新时返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
